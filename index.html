<!DOCTYPE html>
<html>
<head>
<title>Algebra Digital MCQ Assessment</title>

<style>
body{
font-family: Arial;
background:#f4f6f9;
padding:40px;
}

.container{
background:white;
padding:30px;
max-width:1000px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.question{
margin-bottom:25px;
padding-bottom:15px;
border-bottom:1px solid #ddd;
}

.explanation{
margin-top:10px;
padding:10px;
border-radius:5px;
}

.correct{background:#d4edda;}
.incorrect{background:#f8d7da;}

button{
padding:12px 25px;
background:#2e86de;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
font-size:16px;
}
</style>
</head>

<body>

<div class="container">

<h1>Algebra Digital MCQ Assessment</h1>
<p>Please answer all 35 questions carefully.</p>

<!-- ================= QUESTIONS ================= -->

<!-- TEMPLATE USED FOR ALL QUESTIONS -->

<!-- Q1 -->
<div class="question">
<p><strong>1. Property of equality when a = b then b = a?</strong></p>
<input type="radio" name="q1" value="A"> A<br>
<input type="radio" name="q1" value="B"> B<br>
<input type="radio" name="q1" value="C"> C<br>
<input type="radio" name="q1" value="D"> D<br>
<div id="exp1" class="explanation"></div>
</div>

<!-- Q2 -->
<div class="question">
<p><strong>2. Which point makes relation not a function?</strong></p>
<input type="radio" name="q2" value="A"> A<br>
<input type="radio" name="q2" value="B"> B<br>
<input type="radio" name="q2" value="C"> C<br>
<input type="radio" name="q2" value="D"> D<br>
<div id="exp2" class="explanation"></div>
</div>

<!-- Q3 to Q35 -->
<!-- Repeat structure -->
</body>
<script>
function submitTest(){

let score = 0;

let answers = {
q1:"B", q2:"B", q3:"B", q4:"B", q5:"A",
q6:"B", q7:"A", q8:"A", q9:"C", q10:"C",
q11:"D", q12:"C", q13:"B", q14:"A", q15:"A",
q16:"B", q17:"A", q18:"D", q19:"D", q20:"A",
q21:"B", q22:"B", q23:"B", q24:"C", q25:"C",
q26:"B", q27:"B", q28:"B", q29:"D", q30:"A",
q31:"A", q32:"C", q33:"B", q34:"C", q35:"B"
};

for(let key in answers){

let selected = document.querySelector('input[name="'+key+'"]:checked');
let exp = document.getElementById("exp"+key.substring(1));

if(selected){
if(selected.value === answers[key]){
score++;
exp.innerHTML="<div class='correct'>✅ Your response shows correct conceptual understanding.</div>";
}
else{
exp.innerHTML="<div class='incorrect'>❌ Review the related algebra concept and re-evaluate your reasoning.</div>";
}
}
}

document.getElementById("finalScore").innerHTML =
"<h2>Your Score: "+score+" / 35</h2>";

}
</script>

<button onclick="submitTest()">Submit Test</button>
<div id="finalScore"></div>

</div>
</body>
</html>
